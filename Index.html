<!<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Royal Pods</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
    }

    header {
      background-color: #000;
      text-align: center;
      padding: 20px;
      border-bottom: 3px solid gold;
    }

    header img {
      width: 150px;
      border-radius: 50%;
    }

    header h1 {
      color: gold;
      margin-top: 10px;
    }

    .container {
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background-color: #111;
      border: 2px solid gold;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .descricao {
      margin: 10px 0;
      color: #ddd;
    }

    .preco {
      font-size: 28px;
      color: gold;
      margin: 10px 0;
    }

    .botao {
      display: block;
      background-color: gold;
      color: #000;
      text-decoration: none;
      padding: 15px;
      border-radius: 8px;
      font-weight: bold;
      margin-top: 15px;
      transition: 0.3s;
    }

    .botao:hover {
      background-color: #ffd700;
    }

    footer {
      text-align: center;
      margin-top: 20px;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <!-- LOGO -->
    <img src="logo.png" alt="Royal Pods Logo">
    <h1>Royal Pods</h1>
  </header>

  <div class="container">

    <div class="card">
      <!-- FOTO DO PRODUTO -->
      <img src="produto.jpg" alt="Produto">

      <!-- DESCRIÇÃO -->
      <div class="descricao">
        Pod descartável 13K puffs, diversos sabores disponíveis.
      </div>

      <!-- PREÇO -->
      <div class="preco">
        R$ 89,90
      </div>

      <!-- BOTÃO WHATSAPP -->
      <a class="botao" href="https://wa.me/+5538998228941" target="_blank">
        Faça seu pedido
      </a>
    </div>

  </div>

  <footer>
    © 2026 Royal Pods
  </footer>

</body>
</html>
